<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>📸 나트랑 앨범</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#111;min-height:100vh;color:white;}
.header{background:linear-gradient(135deg,#1a2332,#2c3e50);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.back-link{background:rgba(255,255,255,.15);border:none;color:white;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
.header-title{color:white;font-size:17px;font-weight:700;flex:1;}
.header-count{color:rgba(255,255,255,.6);font-size:12px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;flex-shrink:0;}
.sync-dot.err{background:#e74c3c;}
.top-area{padding:14px;max-width:600px;margin:0 auto;}
.status-badge{border-radius:12px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:13px;}
.status-online{background:rgba(39,174,96,.2);border:1px solid rgba(39,174,96,.4);}
.status-offline{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);}
.upload-label{display:block;background:rgba(255,255,255,.07);border:2px dashed rgba(255,255,255,.3);border-radius:16px;padding:22px 16px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:12px;}
.upload-label:active{background:rgba(255,255,255,.12);}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.tool-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;}
.tool-btn.active{background:#e67e22;color:white;}
#upload-progress{display:none;margin-bottom:12px;}
.prog-text{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:5px;}
.prog-track{background:rgba(255,255,255,.1);border-radius:10px;height:6px;overflow:hidden;}
.prog-bar{height:100%;background:#e67e22;border-radius:10px;width:0%;transition:.3s;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.grid-item{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:#222;}
.grid-item img{width:100%;height:100%;object-fit:cover;display:block;transition:.2s;}
.grid-item.selected::after{content:'✓';position:absolute;top:5px;right:5px;background:#e67e22;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.date-tag{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:rgba(255,255,255,.85);font-size:10px;padding:3px 6px;display:none;}
.grid-item:hover .date-tag{display:block;}
.empty{text-align:center;padding:60px 20px;}
.empty-emoji{font-size:52px;margin-bottom:12px;}
.empty-text{color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
#lightbox.active{display:flex;}
.lb-close{position:fixed;top:14px;right:16px;background:rgba(255,255,255,.15);border:none;color:white;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;z-index:10000;display:flex;align-items:center;justify-content:center;}
.lb-img-wrap{max-width:100vw;max-height:82vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#lb-img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:4px;}
.lb-nav{display:flex;align-items:center;gap:20px;margin-top:10px;}
.lb-nav-btn{background:rgba(255,255,255,.15);border:none;color:white;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-counter{color:rgba(255,255,255,.7);font-size:13px;min-width:60px;text-align:center;}
.lb-meta{color:rgba(255,255,255,.5);font-size:12px;text-align:center;margin-top:5px;}
.lb-actions{display:flex;gap:8px;margin-top:8px;}
.lb-action-btn{background:rgba(255,255,255,.1);border:none;color:white;border-radius:10px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.lb-del-btn{background:rgba(231,76,60,.4);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1a2332,#2c3e50);padding:10px 16px;display:none;gap:8px;justify-content:space-between;align-items:center;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.4);}
.bottom-bar.visible{display:flex;}
.sel-count{color:white;font-size:13px;font-weight:600;}
.sel-del-btn{background:#e74c3c;border:none;color:white;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;}
.sel-cancel-btn{background:rgba(255,255,255,.15);border:none;color:white;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;}
.loading-spin{text-align:center;padding:40px;color:rgba(255,255,255,.4);font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-link">←</a>
  <div class="header-title">📸 나트랑 앨범 2026</div>
  <div class="sync-dot" id="sync-dot"></div>
  <div class="header-count" id="header-count"></div>
</div>

<div class="top-area">
  <div class="status-badge status-online" id="status-badge">
    <span id="status-icon">📶</span>
    <span id="status-text">온라인 — 사진을 추가할 수 있어요</span>
  </div>

  <div id="upload-wrap">
    <label class="upload-label" for="photo-input">
      <div style="font-size:32px;margin-bottom:8px;">➕</div>
      <div style="font-size:14px;font-weight:600;">사진 추가하기</div>
      <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;">여러 장 한번에 선택 가능 · 자동으로 두 폰에 공유돼요</div>
    </label>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="addPhotos(this)">
  </div>

  <div id="upload-progress">
    <div class="prog-text" id="prog-text">사진 처리 중...</div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none;">
    <button class="tool-btn active" id="sort-new" onclick="setSort('new')">🕐 최신순</button>
    <button class="tool-btn" id="sort-old" onclick="setSort('old')">🕐 오래된순</button>
    <button class="tool-btn" id="select-mode-btn" onclick="toggleSelectMode()">☑️ 선택</button>
    <button class="tool-btn" onclick="clearAll()" style="margin-left:auto;background:rgba(231,76,60,.3);color:rgba(255,120,100,1);">🗑️ 전체삭제</button>
  </div>
</div>

<div style="max-width:600px;margin:0 auto;padding:0 0 80px;">
  <div class="grid" id="photo-grid"></div>
  <div class="loading-spin" id="loading-state">⏳ 사진 불러오는 중...</div>
  <div class="empty" id="empty-state" style="display:none;">
    <div class="empty-emoji">🌴</div>
    <div class="empty-text">아직 사진이 없어요<br>여행에서 찍은 소중한 순간을<br>여기에 담아보세요 💕<br><br><span style="font-size:12px;color:rgba(255,255,255,.3);">꾹 누르면 사진 삭제</span></div>
  </div>
</div>

<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
  <div class="lb-nav">
    <button class="lb-nav-btn" onclick="lbNav(-1)">◀</button>
    <div class="lb-counter" id="lb-counter"></div>
    <button class="lb-nav-btn" onclick="lbNav(1)">▶</button>
  </div>
  <div class="lb-meta" id="lb-meta"></div>
  <div class="lb-actions">
    <button class="lb-action-btn lb-del-btn" onclick="lbDelete()">🗑️ 이 사진 삭제</button>
  </div>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="sel-cancel-btn" onclick="toggleSelectMode()">취소</button>
  <span class="sel-count" id="sel-count">0장 선택</span>
  <button class="sel-del-btn" onclick="deleteSelected()">선택 삭제</button>
</div>

<script>
var SUPABASE_URL = 'https://krwzqoktydwalnsbshmc.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtyd3pxb2t0eWR3YWxuc2JzaG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyOTYsImV4cCI6MjA5OTU0MTI5Nn0.ZcVoEfiJFtvRfuU-5Eh8ywk0rxLvCoMuaiSdj2bdGjc';

var photos = [], sortOrder = 'new', selectMode = false, selected = [], lbIdx = 0, pressTimer = null;

function sbFetch(method, path, body) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
}

function setSyncStatus(ok) {
  var dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (ok ? '' : ' err');
}

async function loadPhotos() {
  try {
    var res = await sbFetch('GET', 'album?select=*&order=ts.desc');
    if (!res.ok) throw new Error();
    photos = await res.json();
    setSyncStatus(true);
  } catch(e) {
    setSyncStatus(false);
    try { var s = localStorage.getItem('nt_album_cache'); if(s) photos = JSON.parse(s); } catch(e2) {}
  }
  document.getElementById('loading-state').style.display = 'none';
  render();
}

function updateStatus() {
  var online = navigator.onLine;
  var badge = document.getElementById('status-badge');
  var icon = document.getElementById('status-icon');
  var text = document.getElementById('status-text');
  var wrap = document.getElementById('upload-wrap');
  if (online) {
    badge.className = 'status-badge status-online';
    icon.textContent = '📶'; text.textContent = '온라인 — 사진을 추가할 수 있어요';
    wrap.style.display = 'block';
  } else {
    badge.className = 'status-badge status-offline';
    icon.textContent = '📵'; text.textContent = '인터넷 연결 시에만 사진을 추가할 수 있어요';
    wrap.style.display = 'none';
  }
}

async function addPhotos(input) {
  var files = Array.from(input.files);
  if (!files.length) return;
  var total = files.length, done = 0;
  document.getElementById('upload-progress').style.display = 'block';
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    await new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = async function() {
          var canvas = document.createElement('canvas');
          var max = 1200, w = img.width, h = img.height;
          if (w > max || h > max) { if (w > h) { h = Math.round(h*max/w); w = max; } else { w = Math.round(w*max/h); h = max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var src = canvas.toDataURL('image/jpeg', 0.72);
          var now = new Date();
          var row = { src: src, date: now.toLocaleDateString('ko-KR'), time: now.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}), ts: now.getTime() };
          try {
            var res = await sbFetch('POST', 'album', row);
            if (res.ok) { var rows = await res.json(); if(rows[0]) photos.unshift(rows[0]); }
          } catch(err) { photos.unshift(row); }
          done++;
          document.getElementById('prog-bar').style.width = (done/total*100) + '%';
          document.getElementById('prog-text').textContent = done + ' / ' + total + '장 처리 중...';
          resolve();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }
  try { localStorage.setItem('nt_album_cache', JSON.stringify(photos)); } catch(e) {}
  document.getElementById('upload-progress').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  input.value = '';
  render();
}

function setSort(o) {
  sortOrder = o;
  document.getElementById('sort-new').className = 'tool-btn' + (o==='new'?' active':'');
  document.getElementById('sort-old').className = 'tool-btn' + (o==='old'?' active':'');
  render();
}

function getSorted() {
  var arr = photos.slice();
  if (sortOrder === 'new') arr.sort(function(a,b){return b.ts-a.ts;});
  else arr.sort(function(a,b){return a.ts-b.ts;});
  return arr;
}

function toggleSelectMode() {
  selectMode = !selectMode; selected = [];
  document.getElementById('select-mode-btn').className = 'tool-btn'+(selectMode?' active':'');
  document.getElementById('bottom-bar').className = 'bottom-bar'+(selectMode?' visible':'');
  render();
}
function toggleSelect(id) {
  var pos = selected.indexOf(id);
  if (pos===-1) selected.push(id); else selected.splice(pos,1);
  document.getElementById('sel-count').textContent = selected.length + '장 선택';
  render();
}
async function deleteSelected() {
  if (!selected.length) return;
  if (!confirm('선택한 ' + selected.length + '장을 삭제할까요?')) return;
  for (var i = 0; i < selected.length; i++) {
    var id = selected[i];
    photos = photos.filter(function(p){return p.id!==id;});
    try { await sbFetch('DELETE', 'album?id=eq.'+id); } catch(e) {}
  }
  selected = [];
  try { localStorage.setItem('nt_album_cache', JSON.stringify(photos)); } catch(e) {}
  toggleSelectMode();
}

function startPress(id) {
  pressTimer = setTimeout(function() {
    if (confirm('이 사진을 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) {
      deletePhoto(id);
    }
  }, 600);
}
function cancelPress() { clearTimeout(pressTimer); }

async function deletePhoto(id) {
  photos = photos.filter(function(p){return p.id!==id;});
  try { await sbFetch('DELETE', 'album?id=eq.'+id); } catch(e) {}
  try { localStorage.setItem('nt_album_cache', JSON.stringify(photos)); } catch(e) {}
  render();
}

async function clearAll() {
  if (!photos.length) return;
  if (!confirm('⚠️ 앨범의 모든 사진('+photos.length+'장)을 삭제할까요?\n두 폰 모두에서 삭제돼요!')) return;
  photos = [];
  try { await sbFetch('DELETE', 'album?id=gt.0'); } catch(e) {}
  try { localStorage.removeItem('nt_album_cache'); } catch(e) {}
  render();
}

function openLB(idx) { lbIdx = idx; showLB(); }
function showLB() {
  var sorted = getSorted();
  if (!sorted.length) return;
  lbIdx = Math.max(0, Math.min(lbIdx, sorted.length-1));
  var item = sorted[lbIdx];
  document.getElementById('lb-img').src = item.src;
  document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + sorted.length;
  document.getElementById('lb-meta').textContent = (item.date||'') + ' ' + (item.time||'');
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLB() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow = ''; }
function lbNav(dir) { var s = getSorted(); lbIdx = (lbIdx+dir+s.length)%s.length; showLB(); }
function lbDelete() {
  var sorted = getSorted();
  var item = sorted[lbIdx];
  if (!confirm('이 사진을 삭제할까요?')) return;
  closeLB(); deletePhoto(item.id);
}

var lbTX = 0;
document.getElementById('lightbox').addEventListener('touchstart', function(e){lbTX=e.touches[0].clientX;});
document.getElementById('lightbox').addEventListener('touchend', function(e){var dx=e.changedTouches[0].clientX-lbTX;if(Math.abs(dx)>50)lbNav(dx>0?-1:1);});
document.addEventListener('keydown', function(e){if(e.key==='Escape')closeLB();if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);});

function render() {
  var sorted = getSorted();
  var grid = document.getElementById('photo-grid');
  var empty = document.getElementById('empty-state');
  var toolbar = document.getElementById('toolbar');
  var hCount = document.getElementById('header-count');
  grid.innerHTML = '';
  if (!photos.length) { empty.style.display='block'; toolbar.style.display='none'; hCount.textContent=''; return; }
  empty.style.display='none'; toolbar.style.display='flex'; hCount.textContent=photos.length+'장';
  sorted.forEach(function(item, si) {
    var div = document.createElement('div');
    div.className = 'grid-item' + (selected.indexOf(item.id)!==-1?' selected':'');
    div.innerHTML = '<img src="'+item.src+'" alt="" loading="lazy"><div class="date-tag">'+(item.date||'')+'</div>';
    div.addEventListener('click', function(){if(selectMode)toggleSelect(item.id);else openLB(si);});
    div.addEventListener('touchstart', function(){if(!selectMode)startPress(item.id);});
    div.addEventListener('touchend', cancelPress);
    div.addEventListener('touchmove', cancelPress);
    div.addEventListener('mousedown', function(){if(!selectMode)startPress(item.id);});
    div.addEventListener('mouseup', cancelPress);
    div.addEventListener('mouseleave', cancelPress);
    grid.appendChild(div);
  });
}

window.addEventListener('load', function(){ updateStatus(); loadPhotos(); });
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);
</script>
</body>
</html>

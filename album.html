<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>📸 나트랑 앨범</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#111; min-height:100vh; color:white; }

/* HEADER */
.header {
  background:linear-gradient(135deg,#1a2332,#2c3e50);
  padding:14px 16px;
  display:flex; align-items:center; gap:10px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.back-link {
  background:rgba(255,255,255,.15); border:none; color:white;
  border-radius:50%; width:36px; height:36px; font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  text-decoration:none; flex-shrink:0;
}
.header-title { color:white; font-size:17px; font-weight:700; flex:1; }
.header-count { color:rgba(255,255,255,.6); font-size:12px; }

/* TOP AREA */
.top-area { padding:16px; max-width:600px; margin:0 auto; }

/* ONLINE / OFFLINE BADGE */
.status-badge {
  border-radius:12px; padding:12px 16px; margin-bottom:14px;
  display:flex; align-items:center; gap:10px; font-size:13px;
}
.status-online { background:rgba(39,174,96,.2); border:1px solid rgba(39,174,96,.4); }
.status-offline { background:rgba(231,76,60,.15); border:1px solid rgba(231,76,60,.3); }

/* UPLOAD */
.upload-label {
  display:block; background:rgba(255,255,255,.07);
  border:2px dashed rgba(255,255,255,.3); border-radius:16px;
  padding:22px 16px; text-align:center; cursor:pointer;
  transition:.2s; margin-bottom:14px;
}
.upload-label:active { background:rgba(255,255,255,.12); }

/* SORT / FILTER */
.toolbar {
  display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;
}
.tool-btn {
  background:rgba(255,255,255,.1); border:none; color:rgba(255,255,255,.8);
  border-radius:10px; padding:6px 12px; font-size:12px; cursor:pointer;
  font-family:inherit; font-weight:500;
}
.tool-btn.active { background:#e67e22; color:white; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
.grid-item {
  position:relative; aspect-ratio:1; overflow:hidden; cursor:pointer;
  background:#222;
}
.grid-item img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform .2s;
}
.grid-item.selected::after {
  content:'✓'; position:absolute; top:6px; right:6px;
  background:#e67e22; color:white; border-radius:50%;
  width:22px; height:22px; display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:700;
}
.grid-item .date-tag {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(0,0,0,.5); color:rgba(255,255,255,.8);
  font-size:10px; padding:3px 6px; display:none;
}
.grid-item:hover .date-tag { display:block; }

/* EMPTY */
.empty { text-align:center; padding:60px 20px; }
.empty-emoji { font-size:56px; margin-bottom:14px; }
.empty-text { color:rgba(255,255,255,.5); font-size:14px; line-height:1.7; }

/* LIGHTBOX */
#lightbox {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.95); z-index:9999;
  flex-direction:column; align-items:center; justify-content:center;
}
#lightbox.active { display:flex; }
.lb-close {
  position:fixed; top:14px; right:16px; background:rgba(255,255,255,.15);
  border:none; color:white; border-radius:50%; width:40px; height:40px;
  font-size:20px; cursor:pointer; z-index:10000;
  display:flex; align-items:center; justify-content:center;
}
.lb-img-wrap {
  max-width:100vw; max-height:85vh; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
#lb-img {
  max-width:100%; max-height:85vh; object-fit:contain;
  border-radius:4px;
}
.lb-nav {
  display:flex; align-items:center; gap:20px; margin-top:12px; padding:0 16px;
}
.lb-nav-btn {
  background:rgba(255,255,255,.15); border:none; color:white;
  border-radius:50%; width:40px; height:40px; font-size:20px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.lb-counter { color:rgba(255,255,255,.7); font-size:13px; min-width:60px; text-align:center; }
.lb-meta { color:rgba(255,255,255,.5); font-size:12px; text-align:center; margin-top:6px; }
.lb-actions { display:flex; gap:8px; margin-top:10px; }
.lb-action-btn {
  background:rgba(255,255,255,.1); border:none; color:white;
  border-radius:10px; padding:8px 14px; font-size:12px;
  cursor:pointer; font-family:inherit;
}
.lb-del-btn { background:rgba(231,76,60,.4); }

/* BOTTOM BAR */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:linear-gradient(135deg,#1a2332,#2c3e50);
  padding:10px 16px; display:none; gap:8px; justify-content:space-between;
  align-items:center; z-index:50; box-shadow:0 -2px 12px rgba(0,0,0,.4);
}
.bottom-bar.visible { display:flex; }
.sel-count { color:white; font-size:13px; font-weight:600; }
.sel-del-btn {
  background:#e74c3c; border:none; color:white; border-radius:10px;
  padding:8px 16px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:600;
}
.sel-cancel-btn {
  background:rgba(255,255,255,.15); border:none; color:white; border-radius:10px;
  padding:8px 14px; font-size:13px; cursor:pointer; font-family:inherit;
}

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#111; }
::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="index.html" class="back-link">←</a>
  <div class="header-title">📸 나트랑 앨범 2026</div>
  <div class="header-count" id="header-count"></div>
</div>

<!-- TOP AREA -->
<div class="top-area">

  <!-- Status badge -->
  <div class="status-badge status-online" id="status-badge">
    <span id="status-icon">📶</span>
    <span id="status-text">온라인 — 사진을 추가할 수 있어요</span>
  </div>

  <!-- Upload -->
  <div id="upload-wrap">
    <label class="upload-label" for="photo-input">
      <div style="font-size:32px;margin-bottom:8px;">➕</div>
      <div style="font-size:14px;font-weight:600;color:white;">사진 추가하기</div>
      <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;">여러 장 한번에 선택 가능</div>
    </label>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="addPhotos(this)">
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none;">
    <button class="tool-btn active" id="sort-new" onclick="setSort('new')">🕐 최신순</button>
    <button class="tool-btn" id="sort-old" onclick="setSort('old')">🕐 오래된순</button>
    <button class="tool-btn" id="select-mode-btn" onclick="toggleSelectMode()">☑️ 선택</button>
    <button class="tool-btn" onclick="clearAll()" style="margin-left:auto;background:rgba(231,76,60,.3);color:rgba(255,100,80,1);">🗑️ 전체삭제</button>
  </div>

  <!-- Progress bar while loading -->
  <div id="upload-progress" style="display:none;margin-bottom:12px;">
    <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:6px;" id="progress-text">사진 처리 중...</div>
    <div style="background:rgba(255,255,255,.1);border-radius:10px;height:6px;overflow:hidden;">
      <div id="progress-bar" style="height:100%;background:#e67e22;border-radius:10px;width:0%;transition:.3s;"></div>
    </div>
  </div>

</div>

<!-- GRID -->
<div style="max-width:600px;margin:0 auto;padding:0 0 80px;">
  <div class="grid" id="photo-grid"></div>
  <div class="empty" id="empty-state">
    <div class="empty-emoji">🌴</div>
    <div class="empty-text">아직 사진이 없어요<br>여행에서 찍은 소중한 순간을<br>여기에 담아보세요 💕</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <div class="lb-img-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="lb-nav">
    <button class="lb-nav-btn" onclick="lbNav(-1)">◀</button>
    <div class="lb-counter" id="lb-counter"></div>
    <button class="lb-nav-btn" onclick="lbNav(1)">▶</button>
  </div>
  <div class="lb-meta" id="lb-meta"></div>
  <div class="lb-actions">
    <button class="lb-action-btn lb-del-btn" onclick="lbDelete()">🗑️ 이 사진 삭제</button>
  </div>
</div>

<!-- BOTTOM BAR (select mode) -->
<div class="bottom-bar" id="bottom-bar">
  <button class="sel-cancel-btn" onclick="toggleSelectMode()">취소</button>
  <span class="sel-count" id="sel-count">0장 선택</span>
  <button class="sel-del-btn" onclick="deleteSelected()">선택 삭제</button>
</div>

<script>
var photos = [];
var sortOrder = 'new';
var selectMode = false;
var selected = [];
var lbIdx = 0;
var pressTimer = null;

// ── Storage ──
function load() {
  try { var s = localStorage.getItem('nt_album_v3'); if (s) photos = JSON.parse(s); } catch(e) { photos = []; }
}
function save() {
  try {
    localStorage.setItem('nt_album_v3', JSON.stringify(photos));
  } catch(e) {
    alert('저장 공간이 부족해요!\n일부 사진이 저장되지 않을 수 있어요.');
  }
}

// ── Network status ──
function updateStatus() {
  var online = navigator.onLine;
  var badge = document.getElementById('status-badge');
  var icon = document.getElementById('status-icon');
  var text = document.getElementById('status-text');
  var wrap = document.getElementById('upload-wrap');
  if (online) {
    badge.className = 'status-badge status-online';
    icon.textContent = '📶';
    text.textContent = '온라인 — 사진을 추가할 수 있어요';
    wrap.style.display = 'block';
  } else {
    badge.className = 'status-badge status-offline';
    icon.textContent = '📵';
    text.textContent = '인터넷 연결 시에만 사진을 추가할 수 있어요';
    wrap.style.display = 'none';
  }
}

// ── Add photos ──
function addPhotos(input) {
  var files = Array.from(input.files);
  if (!files.length) return;
  var total = files.length;
  var done = 0;
  var prog = document.getElementById('upload-progress');
  var progBar = document.getElementById('progress-bar');
  var progText = document.getElementById('progress-text');
  prog.style.display = 'block';

  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var max = 1200;
        var w = img.width, h = img.height;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        var compressed = canvas.toDataURL('image/jpeg', 0.75);
        var now = new Date();
        photos.push({
          src: compressed,
          date: now.toLocaleDateString('ko-KR'),
          time: now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}),
          ts: now.getTime()
        });
        done++;
        var pct = Math.round(done / total * 100);
        progBar.style.width = pct + '%';
        progText.textContent = done + ' / ' + total + '장 처리 중...';
        if (done === total) {
          save();
          prog.style.display = 'none';
          progBar.style.width = '0%';
          render();
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

// ── Sort ──
function setSort(order) {
  sortOrder = order;
  document.getElementById('sort-new').className = 'tool-btn' + (order === 'new' ? ' active' : '');
  document.getElementById('sort-old').className = 'tool-btn' + (order === 'old' ? ' active' : '');
  render();
}

function getSorted() {
  var arr = photos.map(function(p, i) { return { p: p, i: i }; });
  if (sortOrder === 'new') arr.sort(function(a, b) { return b.p.ts - a.p.ts; });
  else arr.sort(function(a, b) { return a.p.ts - b.p.ts; });
  return arr;
}

// ── Select mode ──
function toggleSelectMode() {
  selectMode = !selectMode;
  selected = [];
  document.getElementById('select-mode-btn').className = 'tool-btn' + (selectMode ? ' active' : '');
  document.getElementById('bottom-bar').className = 'bottom-bar' + (selectMode ? ' visible' : '');
  render();
}

function toggleSelect(origIdx) {
  var pos = selected.indexOf(origIdx);
  if (pos === -1) selected.push(origIdx);
  else selected.splice(pos, 1);
  document.getElementById('sel-count').textContent = selected.length + '장 선택';
  render();
}

function deleteSelected() {
  if (!selected.length) return;
  if (!confirm('선택한 ' + selected.length + '장을 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) return;
  selected.sort(function(a, b) { return b - a; });
  selected.forEach(function(i) { photos.splice(i, 1); });
  selected = [];
  save();
  toggleSelectMode();
}

// ── Long press delete ──
function startPress(origIdx) {
  pressTimer = setTimeout(function() {
    if (confirm('이 사진을 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) {
      photos.splice(origIdx, 1);
      save();
      render();
    }
  }, 600);
}
function cancelPress() {
  clearTimeout(pressTimer);
}

// ── Clear all ──
function clearAll() {
  if (!photos.length) return;
  if (confirm('⚠️ 앨범의 모든 사진(' + photos.length + '장)을 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) {
    photos = [];
    save();
    render();
  }
}

// ── Lightbox ──
function openLB(sortedIdx) {
  var sorted = getSorted();
  lbIdx = sortedIdx;
  showLB();
}
function showLB() {
  var sorted = getSorted();
  if (!sorted.length) return;
  lbIdx = Math.max(0, Math.min(lbIdx, sorted.length - 1));
  var item = sorted[lbIdx];
  document.getElementById('lb-img').src = item.p.src;
  document.getElementById('lb-counter').textContent = (lbIdx + 1) + ' / ' + sorted.length;
  document.getElementById('lb-meta').textContent = item.p.date + ' ' + (item.p.time || '');
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
function lbNav(dir) {
  var sorted = getSorted();
  lbIdx = (lbIdx + dir + sorted.length) % sorted.length;
  showLB();
}
function lbDelete() {
  var sorted = getSorted();
  var origIdx = sorted[lbIdx].i;
  if (!confirm('이 사진을 삭제할까요?\n이 작업은 되돌릴 수 없어요!')) return;
  photos.splice(origIdx, 1);
  save();
  closeLB();
  render();
}

// Swipe lightbox
var lbTouchX = 0;
document.getElementById('lightbox').addEventListener('touchstart', function(e) { lbTouchX = e.touches[0].clientX; });
document.getElementById('lightbox').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 50) lbNav(dx > 0 ? -1 : 1);
});

// ESC close
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ── Render ──
function render() {
  var sorted = getSorted();
  var grid = document.getElementById('photo-grid');
  var empty = document.getElementById('empty-state');
  var toolbar = document.getElementById('toolbar');
  var hCount = document.getElementById('header-count');

  grid.innerHTML = '';

  if (!photos.length) {
    empty.style.display = 'block';
    toolbar.style.display = 'none';
    hCount.textContent = '';
    return;
  }

  empty.style.display = 'none';
  toolbar.style.display = 'flex';
  hCount.textContent = photos.length + '장';

  sorted.forEach(function(item, sortedIdx) {
    var div = document.createElement('div');
    div.className = 'grid-item' + (selected.indexOf(item.i) !== -1 ? ' selected' : '');

    div.innerHTML = '<img src="' + item.p.src + '" alt="" loading="lazy">'
      + '<div class="date-tag">' + item.p.date + '</div>';

    // Click: open LB or select
    div.addEventListener('click', function() {
      if (selectMode) { toggleSelect(item.i); }
      else { openLB(sortedIdx); }
    });

    // Long press: delete (only in non-select mode)
    div.addEventListener('touchstart', function(e) {
      if (!selectMode) startPress(item.i);
    });
    div.addEventListener('touchend', cancelPress);
    div.addEventListener('touchmove', cancelPress);
    div.addEventListener('mousedown', function() { if (!selectMode) startPress(item.i); });
    div.addEventListener('mouseup', cancelPress);
    div.addEventListener('mouseleave', cancelPress);

    grid.appendChild(div);
  });
}

// ── Init ──
window.addEventListener('load', function() {
  load();
  updateStatus();
  render();
});
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);
</script>
</body>
</html>
